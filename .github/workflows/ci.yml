name: CI

on:
  push:
    branches: [main, stage]
  pull_request:
    branches: [main, stage]

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test
        env:
          ANTHROPIC_API_KEY: test-key-placeholder-ci
          RESEND_API_KEY: test-key-placeholder-ci
          NODE_ENV: test

      - name: Build (Vite)
        run: npm run build

      - name: Security audit
        run: npm audit --audit-level=high
