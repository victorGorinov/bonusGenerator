<svg width="620" height="140" viewBox="0 0 620 140" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient -->
    <linearGradient id="retomatGradient" x1="0" y1="0" x2="140" y2="140" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#3B82F6"/>
    </linearGradient>
    <!-- Glow -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Icon -->
  <g transform="translate(20,20)">
    <!-- Main stylized R -->
    <path
      d="
        M20 0
        H70
        C100 0 122 20 122 48
        C122 70 108 86 84 93
        L118 120
        H82
        L56 100
        L26 120
        H0
        L34 88
        V20
        C34 8 42 0 54 0
        Z
      "
      fill="url(#retomatGradient)"
      filter="url(#glow)"
    />
    <!-- Inner cut -->
    <path
      d="
        M54 24
        H70
        C84 24 94 33 94 45
        C94 58 84 66 70 66
        H54
        V24
        Z
      "
      fill="#0B1020"
    />
    <!-- Dynamic diagonal cut -->
    <path
      d="
        M34 88
        L58 70
        H84
        L50 100
        L26 120
        H0
        L34 88
        Z
      "
      fill="#0B1020"
      opacity="0.9"
    />
  </g>
  <!-- Brand Text -->
  <text
    x="176"
    y="108"
    font-family="Inter, Arial, sans-serif"
    font-size="94"
    font-weight="700"
    letter-spacing="-3"
    fill="#F8FAFC"
  >
    Retomat
  </text>
  <!-- Accent underline -->
  <rect
    x="182"
    y="122"
    width="330"
    height="8"
    rx="4"
    fill="url(#retomatGradient)"
    opacity="0.95"
  />
</svg>
