<!DOCTYPE html>
<html lang="en">
<head>
<script src="/lang-init.js"></script>
<style>html[data-lang="en"] [data-tr-ru]{display:none}html[data-lang="ru"] [data-tr-en]{display:none}</style>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Configurator — Retomat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
<style>
:root{--bg:#0a0d14;--bg2:#0f1420;--bg3:#141926;--card:#161c2d;--border:#1e2740;--accent:#4f6ef7;--accent2:#7c3aed;--text:#e8eaf0;--muted:#8892a4;--success:#10b981;--warn:#f59e0b;--danger:#ef4444;--sidebar-w:220px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;background:#0a0d14}
body{height:100%;font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);font-size:14px;display:flex;min-height:100vh}
.main{opacity:0;transition:opacity .15s}
.main.ready{opacity:1}

/* ── SIDEBAR ── */
.sidebar{width:var(--sidebar-w);min-height:100vh;background:#1E1B4B;border-right:1px solid rgba(255,255,255,.06);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:50}
.sb-logo{padding:18px 16px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;gap:10px;cursor:pointer}
.sb-logo-img{height:28px;width:auto;display:block;flex-shrink:0}
.sb-logo-tag{font-size:9px;font-weight:700;color:#1E1B4B;background:#F59E0B;padding:1px 6px;border-radius:8px;letter-spacing:.4px;margin-left:2px;align-self:center}
.sb-nav{flex:1;padding:10px 0;overflow-y:auto}
.nav-lbl{padding:8px 16px 3px;font-size:.65rem;font-weight:600;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.08em}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;color:rgba(255,255,255,.5);font-size:.83rem;font-weight:500;position:relative;transition:background .15s,color .15s;text-decoration:none;border:none;background:none;width:100%;font-family:inherit}
.nav-item:hover{background:rgba(255,255,255,.07);color:#fff}
.nav-item.active{background:rgba(79,110,247,.25);color:#a0b0ff}
.nav-item.active::before{content:'';position:absolute;left:0;top:4px;bottom:4px;width:3px;background:var(--accent);border-radius:0 2px 2px 0}
.nav-item.off{opacity:.38;cursor:default;pointer-events:none}
.nav-sub{padding-left:30px;font-size:.77rem;display:none}
.nav-chevron{margin-left:auto;font-size:16px;color:rgba(255,255,255,.7);flex-shrink:0;padding:0 4px;cursor:pointer;user-select:none;transition:color .15s;line-height:1}
.nav-chevron:hover{color:#fff}
.nav-badge{margin-left:auto;background:rgba(79,110,247,.3);color:#a0b0ff;font-size:.6rem;padding:1px 5px;border-radius:100px;font-weight:700}
.nav-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.sb-foot{padding:12px 16px;border-top:1px solid rgba(255,255,255,.06)}
.sb-back{display:flex;align-items:center;gap:6px;color:rgba(255,255,255,.4);font-size:.78rem;text-decoration:none;transition:color .15s;cursor:pointer;background:none;border:none;font-family:inherit;padding:0;width:100%;text-align:left}
.sb-back:hover{color:#fff}

/* ── MAIN LAYOUT ── */
.main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{height:64px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:10px;position:sticky;top:0;z-index:40}
.topbar-title{font-weight:600;font-size:.92rem}
.topbar-sep,.topbar-sub{color:var(--muted);font-size:.8rem}
.topbar-right{margin-left:auto}
.content{flex:1;padding:26px 30px;max-width:1100px}

/* ── LANG TOGGLE ── */
.lang-toggle{display:flex;background:var(--bg2);border:1px solid var(--border);border-radius:100px;padding:2px;gap:1px;flex-shrink:0}
.lt-btn{padding:3px 10px;border-radius:100px;font-size:.68rem;font-weight:700;cursor:pointer;border:none;background:none;color:var(--muted);font-family:inherit;transition:all .15s;letter-spacing:.05em}
.lt-btn:hover{color:var(--text)}
.lt-btn.active{background:var(--accent);color:#fff}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:8px;font-size:.83rem;font-weight:600;cursor:pointer;border:none;transition:all .2s;font-family:inherit;text-decoration:none}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 2px 12px rgba(79,110,247,.3)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(79,110,247,.45)}
.btn-outline{background:transparent;color:var(--text);border:1px solid var(--border)}
.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
.btn-ghost{background:transparent;color:var(--muted);border:none}
.btn-ghost:hover{color:var(--text)}
.btn-sm{padding:5px 11px;font-size:.76rem}
.btn-lg{padding:11px 26px;font-size:.92rem;border-radius:10px}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important;box-shadow:none!important}

/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
.card-title{font-weight:600;font-size:.88rem;margin-bottom:14px;color:#a0b0ff}
.card-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.card-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}

/* ── FORM ELEMENTS ── */
.form-row{margin-bottom:14px}
.form-row:last-child{margin-bottom:0}
.form-label{display:block;font-size:.75rem;font-weight:600;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
.form-input{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:8px 11px;border-radius:8px;font-size:.85rem;font-family:inherit;outline:none;transition:border-color .2s}
.form-input:focus{border-color:var(--accent)}
select.form-input{cursor:pointer}
.form-input-sm{padding:5px 9px;font-size:.8rem;width:90px}

/* ── CHIPS ── */
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{padding:5px 13px;border-radius:100px;border:1px solid var(--border);font-size:.78rem;font-weight:600;cursor:pointer;transition:all .15s;color:var(--muted);background:transparent}
.chip:hover{border-color:var(--accent);color:var(--accent)}
.chip.on{background:rgba(79,110,247,.2);border-color:rgba(79,110,247,.6);color:#a0b0ff}
.chip.type-card{border-radius:10px;padding:10px 16px;display:flex;flex-direction:column;gap:3px;align-items:flex-start;min-width:130px}
.chip.type-card .tc-icon{font-size:1.3rem}
.chip.type-card .tc-name{font-weight:700;font-size:.83rem}
.chip.type-card .tc-desc{font-size:.7rem;color:var(--muted);font-weight:400}

/* ── RANGE SLIDER ── */
.range-wrap{display:flex;align-items:center;gap:10px}
.range-val{font-size:.88rem;font-weight:700;color:var(--text);min-width:50px;text-align:right}
input[type=range]{flex:1;accent-color:var(--accent);cursor:pointer;height:4px}

/* ── TYPE SWITCHER ── */
.type-switch{display:flex;gap:8px;margin-bottom:24px}
.type-btn{display:flex;align-items:center;gap:7px;padding:9px 20px;border-radius:10px;border:1.5px solid var(--border);font-size:.85rem;font-weight:600;cursor:pointer;transition:all .2s;color:var(--muted);background:var(--card);font-family:inherit}
.type-btn:hover{border-color:rgba(79,110,247,.4);color:var(--text)}
.type-btn.active{border-color:var(--accent);background:rgba(79,110,247,.12);color:#a0b0ff;box-shadow:0 0 0 1px rgba(79,110,247,.2)}

/* ── MECHANICS TOGGLE LIST ── */
.mech-list{display:flex;flex-direction:column;gap:6px}
.mech-row{background:var(--bg3);border:1px solid var(--border);border-radius:9px;overflow:hidden;transition:border-color .15s}
.mech-row.active{border-color:rgba(79,110,247,.4)}
.mech-header{display:flex;align-items:center;gap:10px;padding:9px 13px;cursor:pointer;user-select:none}
.mech-header:hover{background:rgba(255,255,255,.03)}
.mech-toggle{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--border);background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;font-size:11px;color:transparent}
.mech-row.active .mech-toggle{background:var(--accent);border-color:var(--accent);color:#fff}
.mech-name{font-size:.83rem;font-weight:600;color:var(--text);flex:1}
.mech-badge{font-size:.68rem;padding:1px 7px;border-radius:100px;background:rgba(79,110,247,.12);color:#a0b0ff;font-weight:700}
.mech-params{display:none;padding:10px 13px 12px;border-top:1px solid var(--border);background:rgba(0,0,0,.15)}
.mech-row.active .mech-params{display:block}
.mech-params-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.mech-params-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mp-row{display:flex;flex-direction:column;gap:4px}
.mp-lbl{font-size:.68rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.mp-inp{width:100%;background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:5px 9px;border-radius:6px;font-size:.82rem;font-family:inherit;outline:none;transition:border-color .2s}
.mp-inp:focus{border-color:var(--accent)}
.mp-unit{font-size:.7rem;color:var(--muted)}

/* ── CHAIN GROUP ── */
.chain-group{border:1px solid rgba(79,110,247,.2);border-radius:10px;background:rgba(79,110,247,.04);overflow:hidden;margin-top:2px}
.chain-header{display:flex;align-items:center;gap:8px;padding:7px 12px;background:rgba(79,110,247,.08);border-bottom:1px solid rgba(79,110,247,.15)}
.chain-header-icon{font-size:14px}
.chain-header-title{font-size:.75rem;font-weight:700;color:#a0b0ff;text-transform:uppercase;letter-spacing:.06em}
.chain-header-hint{font-size:.68rem;color:var(--muted);margin-left:auto}
.chain-steps{display:flex;flex-direction:column;gap:5px;padding:8px}

/* ── ECON GRID ── */
.econ-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.econ-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px 16px;text-align:center;transition:box-shadow .3s}
.econ-card-sm{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px}
.econ-card.flash-good{animation:cardFlash .6s ease}
@keyframes cardFlash{0%{box-shadow:0 0 0 0 rgba(16,185,129,.5)}70%{box-shadow:0 0 0 6px rgba(16,185,129,0)}100%{box-shadow:none}}
.econ-label{font-size:.7rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.econ-val{font-size:1.25rem;font-weight:700}
.econ-val.pos{color:var(--success)}
.econ-val.neg{color:#ef4444}
.econ-val.neu{color:var(--warn)}
.econ-sub{font-size:.68rem;color:var(--muted);margin-top:2px}
.econ-delta{font-size:.68rem;font-weight:700;margin-top:3px;padding:1px 5px;border-radius:4px;display:inline-block}
.econ-delta.pos{color:#10b981;background:rgba(16,185,129,.12)}
.econ-delta.neg{color:#ef4444;background:rgba(239,68,68,.10)}

/* ── SCENARIO TABLE ── */
.scenario-table{width:100%;border-collapse:collapse;font-size:.82rem;margin-top:4px}
.scenario-table th{font-size:.68rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;padding:5px 10px;background:var(--bg3);text-align:left}
.scenario-table td{padding:7px 10px;border-bottom:1px solid var(--border)}
.scenario-table tr:last-child td{border-bottom:none}
.scenario-table .s-val{font-weight:700;text-align:right}

/* ── TABS ── */
.tab-row{display:flex;gap:2px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:3px;margin-bottom:16px}
.tab{padding:7px 16px;border-radius:8px;font-size:.8rem;font-weight:600;cursor:pointer;color:var(--muted);transition:all .15s;border:none;background:transparent;font-family:inherit;white-space:nowrap}
.tab:hover{color:var(--text);background:rgba(255,255,255,.05)}
.tab.active{background:var(--card);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.35);border:1px solid var(--border)}

/* ── AUDIT / OPTIMIZE ── */
.audit-check{display:flex;gap:12px;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--border)}
.audit-check:last-child{border-bottom:none}
.audit-status{flex-shrink:0;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;margin-top:1px}
.audit-status.ok{background:rgba(16,185,129,.2);color:var(--success)}
.audit-status.warn{background:rgba(245,158,11,.2);color:var(--warn)}
.audit-label{font-weight:600;font-size:.82rem;margin-bottom:2px}
.audit-note{font-size:.77rem;color:var(--muted);line-height:1.4}
.audit-rule{font-size:.68rem;color:rgba(79,110,247,.7);margin-top:2px;font-style:italic}
.rec-card{background:rgba(79,110,247,.07);border:1px solid rgba(79,110,247,.2);border-radius:8px;padding:10px 12px;margin-bottom:8px}
.rec-text{font-size:.82rem;line-height:1.5;margin-bottom:5px}
.rec-meta{display:flex;gap:8px;flex-wrap:wrap}
.rec-tag{font-size:.7rem;padding:1px 7px;border-radius:4px;background:rgba(79,110,247,.15);color:#a0b0ff;font-weight:600}
.rec-impact{font-size:.72rem;color:var(--muted)}

/* ── OPTIMIZE RECS ── */
.opt-rec{background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:11px 14px;margin-bottom:8px}
.opt-rec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;gap:8px}
.opt-rec-factor{font-size:.75rem;font-weight:700;color:#a0b0ff;text-transform:uppercase;letter-spacing:.06em}
.opt-rec-arrow{display:flex;align-items:center;gap:6px;font-size:.82rem;font-weight:600}
.opt-rec-from{color:var(--muted);text-decoration:line-through}
.opt-arrow-sym{color:var(--accent);font-size:.9rem}
.opt-rec-to{color:var(--text)}
.opt-rec-reason{font-size:.78rem;color:var(--muted);line-height:1.45;margin-top:4px}
.opt-rec-impact{font-size:.7rem;font-weight:600;color:var(--success);margin-top:4px}

/* ── ACTION PANEL ── */
.action-panel{display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:11px 16px;margin-bottom:14px}
.action-panel .ap-label{font-size:.75rem;font-weight:600;color:var(--muted);white-space:nowrap}
.action-panel input[type=range]{width:90px;accent-color:var(--accent)}
.action-panel .ap-val{font-size:.82rem;font-weight:700;min-width:36px}

/* ── MISSIONS ── */
.mission-row{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:7px}
.mission-name{font-weight:600;font-size:.82rem;margin-bottom:3px}
.mission-meta{font-size:.73rem;color:var(--muted);display:flex;gap:8px;flex-wrap:wrap}
.mission-tag{padding:1px 6px;border-radius:4px;background:rgba(79,110,247,.15);color:#a0b0ff;font-size:.65rem;font-weight:700}
.mission-narrative{margin-top:6px;font-size:.72rem;color:var(--muted);font-style:italic;line-height:1.4}

/* ── TIER TABLE ── */
.tier-table{width:100%;border-collapse:collapse}
.tier-table th,.tier-table td{text-align:left;padding:8px 10px;font-size:.78rem;border-bottom:1px solid var(--border)}
.tier-table th{font-size:.68rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;background:var(--bg3)}
.tier-table tr:last-child td{border-bottom:none}
.tier-badge{display:inline-flex;align-items:center;gap:5px;padding:2px 8px;border-radius:100px;font-size:.72rem;font-weight:700}

/* ── PRIZE TABLE ── */
.prize-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--border)}
.prize-row:last-child{border-bottom:none}
.prize-place{font-size:.75rem;font-weight:700;color:var(--muted);width:28px;flex-shrink:0}
.prize-bar-wrap{flex:1;background:var(--bg);border-radius:4px;height:5px}
.prize-bar{background:linear-gradient(90deg,var(--accent),var(--accent2));height:5px;border-radius:4px}
.prize-amt{font-size:.8rem;font-weight:700;width:90px;text-align:right;flex-shrink:0}

/* ── VERDICT BADGE ── */
.verdict-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:9px;font-size:.82rem;margin-bottom:14px}
.verdict-row.cheap{background:rgba(148,163,184,.07);border:1px solid rgba(148,163,184,.15);color:#8892a4}
.verdict-row.ok{background:rgba(16,185,129,.07);border:1px solid rgba(16,185,129,.2);color:#6ee7b7}
.verdict-row.warn{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.2);color:#fcd34d}
.verdict-row.high{background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.2);color:#f87171}

/* ── LOADER ── */
.loader{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:.85rem;padding:20px 0}
.spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── BADGES ── */
.badge{display:inline-block;padding:2px 8px;border-radius:100px;font-size:.65rem;font-weight:700}
.badge-pos{background:rgba(16,185,129,.15);color:#10b981}
.badge-neg{background:rgba(239,68,68,.12);color:#f87171}
.badge-neu{background:rgba(245,158,11,.12);color:#f59e0b}

/* ── RESULTS HEADER ── */
.results-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.results-title{font-size:1.1rem;font-weight:700}
.results-actions{display:flex;gap:8px;flex-wrap:wrap}

/* ── ALERT ── */
.alert{border-radius:8px;padding:10px 14px;font-size:.82rem;margin-bottom:12px}
.alert-warn{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);color:var(--warn)}
.alert-info{background:rgba(79,110,247,.08);border:1px solid rgba(79,110,247,.2);color:#a0b0ff}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;right:24px;background:#10b981;color:#fff;padding:10px 18px;border-radius:8px;font-size:.83rem;font-weight:600;z-index:9999;animation:toastIn .2s ease;pointer-events:none}
@keyframes toastIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ── CARD SUBTITLE ── */
.card-subtitle{font-size:10px;color:#666;margin-top:3px;line-height:1.3}

/* ── TOOLTIPS (CSS-only) ── */
[data-tooltip]{border-bottom:1px dashed #555;cursor:help;position:relative}
[data-tooltip]:hover::after{content:attr(data-tooltip);position:absolute;background:#0f1629;border:1px solid #334;color:#ccc;font-size:11px;padding:6px 10px;border-radius:6px;white-space:nowrap;z-index:300;top:100%;left:0;margin-top:4px;pointer-events:none;max-width:280px;white-space:normal;line-height:1.4}

/* ── SCENARIO DOTS ── */
.scenario-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;vertical-align:middle}
.dot-best{background:#4caf50}.dot-base{background:#9e9e9e}.dot-worst{background:#f44336}

/* ── GLOSSARY ── */
.gloss-btn{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:.82rem;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;margin-right:4px}
.gloss-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(79,110,247,.08)}
.gloss-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:none}
.gloss-overlay.open{display:block}
.gloss-panel{position:fixed;top:0;right:-420px;width:420px;max-width:100vw;height:100vh;background:var(--bg2);border-left:1px solid var(--border);z-index:201;display:flex;flex-direction:column;transition:right .25s cubic-bezier(.4,0,.2,1)}
.gloss-panel.open{right:0}
.gloss-head{display:flex;align-items:center;gap:10px;padding:18px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
.gloss-head-title{font-size:.95rem;font-weight:700;flex:1}
.gloss-close{width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all .15s;font-family:inherit}
.gloss-close:hover{border-color:var(--accent);color:var(--accent)}
.gloss-search{padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.gloss-search-inp{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:8px;font-size:.85rem;font-family:inherit;outline:none;transition:border-color .2s}
.gloss-search-inp:focus{border-color:var(--accent)}
.gloss-search-inp::placeholder{color:var(--muted)}
.gloss-body{flex:1;overflow-y:auto;padding:8px 0}
.gloss-group{padding:0 16px}
.gloss-group-lbl{font-size:.65rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;padding:12px 0 6px;border-bottom:1px solid var(--border);margin-bottom:2px}
.gloss-term{padding:10px 0;border-bottom:1px solid rgba(30,39,64,.6)}
.gloss-term:last-child{border-bottom:none}
.gloss-term-name{font-size:.83rem;font-weight:700;color:var(--text);margin-bottom:3px;display:flex;align-items:center;gap:8px}
.gloss-term-tag{font-size:.6rem;font-weight:700;padding:1px 6px;border-radius:100px;background:rgba(79,110,247,.12);color:#a0b0ff}
.gloss-term-def{font-size:.77rem;color:var(--muted);line-height:1.5}
.gloss-term.hidden{display:none}

/* ── GENERATE PROGRESS ── */
.prog-wrap{max-width:460px;margin:40px auto;padding:20px 0}
.prog-title{font-size:1rem;font-weight:700;text-align:center;margin-bottom:5px}
.prog-sub{text-align:center;color:var(--muted);font-size:.82rem;margin-bottom:22px}
.prog-list{list-style:none;display:flex;flex-direction:column;gap:9px}
.pl-item{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:9px;font-size:.83rem;color:var(--muted);transition:all .3s}
.pl-item.done{border-color:rgba(16,185,129,.3);color:var(--text)}
.pl-item.running{border-color:rgba(79,110,247,.3);color:var(--text);background:rgba(79,110,247,.04)}
.pl-icon{font-size:14px;flex-shrink:0;width:16px;text-align:center}

/* ── PLACEHOLDER ── */
.ph{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:200px;color:var(--muted);text-align:center;gap:10px;padding:40px 0}
.ph-ico{font-size:44px;opacity:.5}
.ph-t{font-size:15px;font-weight:700;color:var(--text)}
.ph-s{font-size:.82rem;max-width:360px;line-height:1.6}

/* ── CHANGED PARAMS ── */
.changed-params{font-size:.75rem;color:var(--muted);margin-bottom:10px;padding:8px 12px;background:rgba(79,110,247,.07);border:1px solid rgba(79,110,247,.2);border-radius:8px;line-height:1.6}
.changed-params strong{color:#a0b0ff}

/* ── CHAIN ECON STRIP ── */
.chain-strip{background:rgba(79,110,247,.06);border:1px solid rgba(79,110,247,.18);border-radius:9px;padding:10px 14px;margin-bottom:14px}
.chain-strip-title{font-size:.7rem;font-weight:700;color:#a0b0ff;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.chain-steps-strip{display:flex;gap:0;align-items:stretch}
.chain-step-card{flex:1;padding:8px 10px;text-align:center;border-right:1px solid rgba(79,110,247,.15)}
.chain-step-card:last-child{border-right:none}
.cs-label{font-size:.65rem;color:var(--muted);margin-bottom:3px}
.cs-val{font-size:.9rem;font-weight:700}
.cs-sub{font-size:.63rem;color:var(--muted);margin-top:1px}
.chain-total-row{display:flex;align-items:center;gap:14px;margin-top:8px;padding-top:8px;border-top:1px solid rgba(79,110,247,.15)}
.chain-total-label{font-size:.72rem;color:var(--muted);flex:1}
.chain-total-val{font-size:.95rem;font-weight:800;color:#a0b0ff}
.chain-ratio-pill{font-size:.7rem;font-weight:700;padding:2px 8px;border-radius:100px}
.chain-ratio-ok{background:rgba(16,185,129,.12);color:#10b981}
.chain-ratio-warn{background:rgba(245,158,11,.12);color:#f59e0b}
.chain-ratio-high{background:rgba(239,68,68,.12);color:#ef4444}

@media(max-width:768px){
  .card-grid,.card-grid-3{grid-template-columns:1fr}
  .econ-grid{grid-template-columns:1fr 1fr}
  .mech-params-grid{grid-template-columns:1fr 1fr}
  .content{padding:16px 14px}
  .type-switch{flex-wrap:wrap}
}
@media(max-width:500px){
  .econ-grid{grid-template-columns:1fr}
}
</style>

<script>
document.addEventListener('click', function(e) {
  const a = e.target.closest('a[href]');
  if (!a || !a.closest('.sidebar')) return;
  const href = a.getAttribute('href');
  if (!href || href.startsWith('#') || a.target) return;
  try { if (new URL(href, location.href).origin !== location.origin) return; } catch(e) { return; }
  e.preventDefault();
  const m = document.querySelector('.main');
  if (m) { m.style.transition = 'opacity .1s ease'; m.style.opacity = '0'; }
  setTimeout(() => { location.href = href; }, 110);
});
</script>
