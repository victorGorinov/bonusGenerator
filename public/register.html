<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register — Retomat</title>
<link rel="stylesheet" href="/styles.css">
</head>
<body class="auth-body">
  <div class="auth-card">
    <div class="auth-logo">Reto<span>mat</span></div>
    <div class="auth-sub" data-i18n="sub">Create your workspace</div>
    <form id="register-form">
      <div class="auth-field">
        <label data-i18n="name">Name</label>
        <input type="text" id="f-name" autocomplete="name" required>
      </div>
      <div class="auth-field">
        <label data-i18n="email">Email</label>
        <input type="email" id="f-email" autocomplete="email" required>
      </div>
      <div class="auth-field">
        <label data-i18n="password">Password (min 8 characters)</label>
        <input type="password" id="f-password" autocomplete="new-password" minlength="8" required>
      </div>
      <div class="auth-err" id="auth-err"></div>
      <button type="submit" class="btn-gen" id="submit-btn" data-i18n="register">Create account</button>
    </form>
    <div class="auth-foot">
      <span data-i18n="hasaccount">Already have an account?</span> <a href="/login.html" data-i18n="signin">Sign in</a>
    </div>
  </div>
  <script type="module" src="/register.js"></script>
</body>
</html>
