<!DOCTYPE html>
<html lang="en">
<head>
<!-- Beta lockdown guard: bounces guests to /login.html when BETA_LOCKDOWN is on (no-op otherwise). Must run first. -->
<script src="/auth-guard.js"></script>
<script src="/lang-init.js"></script>
<style>html[data-lang="en"] [data-tr-ru]{display:none}html[data-lang="ru"] [data-tr-en]{display:none}</style>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retention Calendar — Retomat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
<style>
/* ── Base (identical to TG/CG) ─────────────────────────────────────────── */
:root{--bg:#0a0d14;--bg2:#0f1420;--bg3:#141926;--card:#161c2d;--border:#1e2740;--accent:#4f6ef7;--accent2:#7c3aed;--text:#e8eaf0;--muted:#8892a4;--success:#10b981;--warn:#f59e0b;--gold:#F59E0B;--sidebar-w:220px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);font-size:14px;display:flex;min-height:100vh}

/* ── Sidebar ────────────────────────────────────────────────────────────── */
.sidebar{width:var(--sidebar-w);min-height:100vh;background:#1E1B4B;border-right:1px solid rgba(255,255,255,.06);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:50}
.sb-logo{padding:18px 16px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;gap:10px;cursor:pointer}
.sb-logo-img{height:28px;width:auto;display:block;flex-shrink:0}
.sb-logo-tag{font-size:9px;font-weight:700;color:#1E1B4B;background:#F59E0B;padding:1px 6px;border-radius:8px;letter-spacing:.4px;margin-left:2px;align-self:center}
.sb-nav{flex:1;padding:10px 0;overflow-y:auto}
.nav-lbl{padding:8px 16px 3px;font-size:.65rem;font-weight:600;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.08em}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;color:rgba(255,255,255,.5);font-size:.83rem;font-weight:500;position:relative;transition:background .15s,color .15s;text-decoration:none;border:none;background:none;width:100%;font-family:inherit}
.nav-item:hover{background:rgba(255,255,255,.07);color:#fff}
.nav-item.active{background:rgba(79,110,247,.25);color:#a0b0ff}
.nav-item.active::before{content:'';position:absolute;left:0;top:4px;bottom:4px;width:3px;background:var(--accent);border-radius:0 2px 2px 0}
.nav-item.off{opacity:.38;cursor:default;pointer-events:none}
.nav-badge{margin-left:auto;background:rgba(79,110,247,.3);color:#a0b0ff;font-size:.6rem;padding:1px 5px;border-radius:100px;font-weight:700}
.nav-sub{padding-left:30px;font-size:.77rem;display:none}.nav-chevron{margin-left:auto;font-size:16px;color:rgba(255,255,255,.7);flex-shrink:0;padding:0 4px;cursor:pointer;user-select:none;transition:color .15s;line-height:1}.nav-chevron:hover{color:#fff}
.nav-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.sb-foot{padding:12px 16px;border-top:1px solid rgba(255,255,255,.06)}
.sb-back{display:flex;align-items:center;gap:6px;color:rgba(255,255,255,.4);font-size:.78rem;text-decoration:none;transition:color .15s;cursor:pointer;background:none;border:none;font-family:inherit;padding:0;width:100%;text-align:left}
.sb-back:hover{color:#fff}

/* ── Main area ──────────────────────────────────────────────────────────── */
.main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;position:relative}

/* ── Topbar ─────────────────────────────────────────────────────────────── */
.topbar{height:64px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:10px;flex-shrink:0;z-index:40}
.topbar-title{font-weight:700;font-size:.95rem}
.lang-toggle{display:flex;background:var(--bg2);border:1px solid var(--border);border-radius:100px;padding:2px;gap:1px;flex-shrink:0}
.lt-btn{padding:3px 10px;border-radius:100px;font-size:.68rem;font-weight:700;cursor:pointer;border:none;background:none;color:var(--muted);font-family:inherit;transition:all .15s;letter-spacing:.05em}
.lt-btn:hover{color:var(--text)}
.lt-btn.active{background:var(--accent);color:#fff}

/* ── Controls bar (view toggle + action buttons) ─────────────────────── */
#controls-bar{display:flex;align-items:center;gap:8px;padding:7px 24px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0}

/* ── View toggle (Month / Week / Agenda) ─────────────────────────────── */
.view-toggle{display:flex;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:2px;gap:1px;flex-shrink:0}
.vt-btn{padding:4px 12px;border-radius:6px;font-size:.75rem;font-weight:600;cursor:pointer;border:none;background:none;color:var(--muted);font-family:inherit;transition:all .15s;white-space:nowrap}
.vt-btn:hover{color:var(--text)}
.vt-btn.active{background:var(--accent);color:#fff}

/* ── Buttons ─────────────────────────────────────────────────────────────── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:8px;font-size:.83rem;font-weight:600;cursor:pointer;border:none;transition:all .2s;font-family:inherit;text-decoration:none;white-space:nowrap}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 2px 12px rgba(79,110,247,.3)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(79,110,247,.45)}
.btn-outline{background:transparent;color:var(--text);border:1px solid var(--border)}
.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
.btn-sm{padding:5px 11px;font-size:.76rem}

/* ── Filters bar ─────────────────────────────────────────────────────────── */
#filters-bar{display:flex;flex-wrap:wrap;align-items:center;gap:6px;padding:7px 24px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0;min-height:38px}
.rc-filter-btn{padding:3px 11px;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:.74rem;font-weight:500;cursor:pointer;transition:all .15s;font-family:inherit}
.rc-filter-btn:hover{border-color:var(--accent);color:var(--accent)}
.rc-filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.rc-filter-btn.type-chip.active{background:var(--chip-color,var(--accent));border-color:var(--chip-color,var(--accent))}
.rc-filter-sep{color:var(--border);padding:0 2px}

/* ── Calendar area ───────────────────────────────────────────────────────── */
#calendar-wrap{flex:1;overflow:hidden;padding:16px 24px;display:flex;flex-direction:column;min-height:0}
#calendar{flex:1;min-height:0}

/* ── Stats bar ───────────────────────────────────────────────────────────── */
#stats-bar{padding:5px 24px;font-size:.73rem;color:var(--muted);border-top:1px solid var(--border);flex-shrink:0;background:var(--bg2)}
#fc-toggle-btn.active{background:rgba(79,110,247,.2);border-color:var(--accent);color:#a0b0ff}

/* ── Modal ───────────────────────────────────────────────────────────────── */
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;align-items:center;justify-content:center}
#modal-box{background:var(--card);border-radius:12px;width:min(520px,95vw);max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.5);border:1px solid var(--border)}
.modal-header{padding:16px 20px 12px;border-bottom:1px solid var(--border)}
.modal-body{padding:16px 20px;display:flex;flex-direction:column;gap:10px}
.modal-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap}
.rc-lbl{font-size:.73rem;font-weight:600;color:var(--muted);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.rc-field{margin-bottom:6px;font-size:.86rem}
.rc-tag{background:rgba(124,58,237,.15);color:#a0b0ff;border-radius:4px;padding:2px 6px;font-size:.72rem;margin-right:4px}
.form-input{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:8px 11px;border-radius:8px;font-size:.85rem;font-family:inherit;outline:none;transition:border-color .2s}
.form-input:focus{border-color:var(--accent)}
select.form-input{cursor:pointer}

/* ── Status badges ───────────────────────────────────────────────────────── */
.rc-status-badge{display:inline-block;margin-top:5px;padding:2px 10px;border-radius:20px;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.status-draft{background:#374151;color:#D1D5DB}
.status-scheduled{background:#1D4ED8;color:#BFDBFE}
.status-active{background:#065F46;color:#A7F3D0}
.status-completed{background:#1F2937;color:#9CA3AF}
.status-cancelled{background:#7F1D1D;color:#FECACA}

/* ── Date-click create cards ─────────────────────────────────────────────── */
.rc-create-card{display:flex;align-items:center;gap:14px;width:100%;padding:14px 16px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;cursor:pointer;text-align:left;font-family:inherit;color:var(--text);transition:border-color .15s,background .15s}
.rc-create-card:hover{border-color:var(--accent);background:rgba(79,110,247,.07)}

/* ── Template row ────────────────────────────────────────────────────────── */
.rc-template-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:.86rem}
.rc-template-row:last-child{border-bottom:none}

/* ── FullCalendar overrides ──────────────────────────────────────────────── */
.fc{font-family:'Inter',-apple-system,sans-serif;font-size:.82rem;height:100%}
.fc-button-primary,.fc-button-primary:disabled{background:var(--bg3)!important;border-color:var(--border)!important;color:var(--muted)!important;font-family:inherit!important;box-shadow:none!important}
.fc-button-primary:hover{background:var(--card)!important;border-color:var(--accent)!important;color:var(--accent)!important}
.fc-button-primary:not(:disabled).fc-button-active{background:rgba(79,110,247,.2)!important;border-color:var(--accent)!important;color:#a0b0ff!important}
.fc-toolbar-title{font-size:.95rem!important;font-weight:700!important;color:var(--text)!important}
.fc-toolbar.fc-header-toolbar{margin-bottom:12px!important}
.fc-event{cursor:pointer;border-radius:5px!important;font-size:.74rem!important;border:none!important}
.fc-day-today{background:rgba(79,110,247,.05)!important}
.fc-col-header-cell{font-size:.74rem!important;font-weight:600!important;color:var(--muted)!important;background:var(--bg2)!important}
.fc-col-header-cell-cushion{color:var(--muted)!important}
.fc-daygrid-day-number{font-size:.74rem!important;color:var(--muted)!important}
.fc-daygrid-day.fc-day-today .fc-daygrid-day-number{color:var(--accent)!important;font-weight:700!important}
.fc-theme-standard td,.fc-theme-standard th,.fc-theme-standard .fc-scrollgrid{border-color:var(--border)!important}
.fc-scrollgrid{background:var(--card)!important;border-radius:10px!important;overflow:hidden!important}
.fc-list-event:hover td{background:rgba(255,255,255,.04)!important}
.fc-list-day-cushion{background:var(--bg3)!important}
.fc-list-event-title a{color:var(--text)!important}
.fc-popover{background:var(--card)!important;border-color:var(--border)!important}
.fc-popover-title{background:var(--bg3)!important;color:var(--text)!important}

@media(max-width:640px){
  .topbar{padding:0 12px;gap:6px;height:auto;min-height:64px;flex-wrap:wrap;padding-top:8px;padding-bottom:8px}
  #controls-bar{padding:6px 12px;flex-wrap:wrap}
  #calendar-wrap{padding:10px 12px}
  #filters-bar{padding:6px 12px}
}
</style>
<script src="/analytics.js"></script>
</head>

<main class="main">
  <!-- Topbar -->
  <div class="topbar">
    <span class="topbar-title">📅 <span data-tr-en>Retention Calendar</span><span data-tr-ru>Календарь</span></span>
    <div class="topbar-right" style="margin-left:auto;display:flex;align-items:center;gap:8px">
      <button class="btn btn-primary btn-sm" onclick="window._rcOpenNew()"><span data-tr-en>+ New Campaign</span><span data-tr-ru>+ Новая кампания</span></button>
      <button onclick="toggleRCGlossary()" title="Glossary"
        style="background:none;border:1px solid var(--border);border-radius:6px;color:var(--muted);width:28px;height:28px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s"
        onmouseover="this.style.borderColor='var(--accent)';this.style.color='var(--accent)'"
        onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--muted)'">?</button>
      <div class="lang-toggle">
        <button class="lt-btn" id="lt-ru" onclick="setRCLang('ru')">RU</button>
        <button class="lt-btn" id="lt-en" onclick="setRCLang('en')">EN</button>
      </div>
    </div>
  </div>

  <!-- Controls bar: view toggle + action buttons -->
  <div id="controls-bar">
    <div class="view-toggle" id="view-toggle">
      <button class="vt-btn active" data-fc-view="dayGridMonth"><span data-tr-en>Month</span><span data-tr-ru>Месяц</span></button>
      <button class="vt-btn" data-fc-view="timeGridWeek"><span data-tr-en>Week</span><span data-tr-ru>Неделя</span></button>
      <button class="vt-btn" data-fc-view="listMonth"><span data-tr-en>Agenda</span><span data-tr-ru>Список</span></button>
    </div>
    <div style="margin-left:auto;display:flex;gap:6px">
      <button id="fc-toggle-btn" class="btn btn-outline btn-sm" onclick="window._rcToggleForecast()" data-i18n="fc_toggle">Forecast</button>
      <button class="btn btn-outline btn-sm" onclick="window._rcOpenAI()"><span data-tr-en>🤖 AI-Assisted</span><span data-tr-ru>🤖 AI-генерация</span></button>
      <button class="btn btn-outline btn-sm" onclick="window._rcOpenTemplates()"><span data-tr-en>📄 Templates</span><span data-tr-ru>📄 Шаблоны</span></button>

      <button class="btn btn-outline btn-sm" onclick="window._rcExportJSON()">⬇ JSON</button>
    </div>

  <!-- Filters -->

  <!-- Calendar -->

    <div id="calendar"></div>
  </div>

  <!-- Stats -->
  <div id="stats-bar">Loading…</div>
