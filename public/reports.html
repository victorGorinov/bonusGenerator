<!DOCTYPE html>
<html lang="en">
<head>
<script src="/lang-init.js"></script>
<style>html[data-lang="en"] [data-tr-ru]{display:none}html[data-lang="ru"] [data-tr-en]{display:none}</style>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reports — Retomat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
<style>
:root{--bg:#0a0d14;--bg2:#0f1420;--bg3:#141926;--card:#161c2d;--border:#1e2740;--accent:#4f6ef7;--accent2:#7c3aed;--text:#e8eaf0;--muted:#8892a4;--success:#10b981;--warn:#f59e0b;--sidebar-w:220px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;background:#0a0d14}
body{height:100%;font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);font-size:14px;display:flex;min-height:100vh}
.sidebar{width:var(--sidebar-w);min-height:100vh;background:#1E1B4B;border-right:1px solid rgba(255,255,255,.06);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:50}
.sb-logo{padding:18px 16px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;gap:10px;cursor:pointer}
.sb-logo-img{height:28px;width:auto;display:block;flex-shrink:0}
.sb-logo-text{font-weight:800;font-size:.9rem;color:#fff;letter-spacing:-.3px}.sb-logo-text span{color:#F59E0B}
.sb-logo-tag{font-size:9px;font-weight:700;color:#1E1B4B;background:#F59E0B;padding:1px 6px;border-radius:8px;letter-spacing:.4px;margin-left:2px;align-self:center}
.sb-nav{flex:1;padding:10px 0;overflow-y:auto}
.nav-lbl{padding:8px 16px 3px;font-size:.65rem;font-weight:600;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.08em}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;color:rgba(255,255,255,.5);font-size:.83rem;font-weight:500;position:relative;transition:background .15s,color .15s;text-decoration:none;border:none;background:none;width:100%;font-family:inherit}
.nav-item:hover{background:rgba(255,255,255,.07);color:#fff}
.nav-item.active{background:rgba(79,110,247,.25);color:#a0b0ff}
.nav-item.active::before{content:'';position:absolute;left:0;top:4px;bottom:4px;width:3px;background:var(--accent);border-radius:0 2px 2px 0}
.nav-item.off{opacity:.38;cursor:default;pointer-events:none}
.nav-sub{padding-left:30px;font-size:.77rem;display:none}.nav-chevron{margin-left:auto;font-size:16px;color:rgba(255,255,255,.7);flex-shrink:0;padding:0 4px;cursor:pointer;user-select:none;transition:color .15s;line-height:1}.nav-chevron:hover{color:#fff}
.nav-badge{margin-left:auto;background:rgba(79,110,247,.3);color:#a0b0ff;font-size:.6rem;padding:1px 5px;border-radius:100px;font-weight:700}
.nav-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.sb-foot{padding:12px 16px;border-top:1px solid rgba(255,255,255,.06)}
.sb-back{display:flex;align-items:center;gap:6px;color:rgba(255,255,255,.4);font-size:.78rem;text-decoration:none;transition:color .15s;cursor:pointer;background:none;border:none;font-family:inherit;padding:0;width:100%;text-align:left}
.sb-back:hover{color:#fff}
.main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-height:100vh;opacity:0;transition:opacity .15s}
.main.ready{opacity:1}
.topbar{height:64px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:10px;position:sticky;top:0;z-index:40}
.topbar-title{font-weight:600;font-size:.92rem}
.topbar-sep,.topbar-sub{color:var(--muted);font-size:.8rem}
.topbar-right{margin-left:auto}
.lang-toggle{display:flex;background:var(--bg2);border:1px solid var(--border);border-radius:100px;padding:2px;gap:1px;flex-shrink:0}
.lt-btn{padding:3px 10px;border-radius:100px;font-size:.68rem;font-weight:700;cursor:pointer;border:none;background:none;color:var(--muted);font-family:inherit;transition:all .15s;letter-spacing:.05em}
.lt-btn:hover{color:var(--text)}
.lt-btn.active{background:var(--accent);color:#fff}
.content{flex:1;padding:26px 30px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:8px;font-size:.83rem;font-weight:600;cursor:pointer;border:none;transition:all .2s;font-family:inherit;text-decoration:none}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 2px 12px rgba(79,110,247,.3)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(79,110,247,.45)}
.btn-outline{background:transparent;color:var(--text);border:1px solid var(--border)}
.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
.btn-ghost{background:transparent;color:var(--muted);border:none}
.btn-ghost:hover{color:var(--text)}
.btn-sm{padding:5px 11px;font-size:.76rem}
.btn-lg{padding:11px 26px;font-size:.92rem;border-radius:10px}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important;box-shadow:none!important}
/* STEPS */
.step-header{margin-bottom:28px}
.step-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(79,110,247,.15);border:1px solid rgba(79,110,247,.3);color:#a0b0ff;font-size:.7rem;font-weight:700;padding:4px 12px;border-radius:100px;margin-bottom:10px;text-transform:uppercase;letter-spacing:.05em}
.step-title{font-size:1.35rem;font-weight:700;margin-bottom:4px}
.step-sub{color:var(--muted);font-size:.85rem}
/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
.card-title{font-weight:600;font-size:.88rem;margin-bottom:12px;color:#a0b0ff}
/* FORM */
.form-row{margin-bottom:16px}
.form-label{display:block;font-size:.78rem;font-weight:600;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em}
.form-input{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:8px;font-size:.85rem;font-family:inherit;outline:none;transition:border-color .2s}
.form-input:focus{border-color:var(--accent)}
select.form-input{cursor:pointer}
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{padding:5px 13px;border-radius:100px;border:1px solid var(--border);font-size:.78rem;font-weight:600;cursor:pointer;transition:all .15s;color:var(--muted);background:transparent}
.chip:hover{border-color:var(--accent);color:var(--accent)}
.chip.on{background:rgba(79,110,247,.2);border-color:rgba(79,110,247,.6);color:#a0b0ff}
/* NAV FOOTER */
.nav-footer{display:flex;justify-content:space-between;align-items:center;margin-top:28px;padding-top:18px;border-top:1px solid var(--border)}
/* ECON */
.econ-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.econ-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px 16px;text-align:center}
.econ-label{font-size:.7rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.econ-val{font-size:1.25rem;font-weight:700}
.econ-val.pos{color:var(--success)}
.econ-val.neg{color:#ef4444}
.econ-val.neu{color:var(--warn)}
.econ-sub{font-size:.68rem;color:var(--muted);margin-top:2px}
/* TAB ROW */
.tab-row{display:flex;gap:2px;background:var(--bg3);border-radius:8px;padding:3px;margin-bottom:16px}
.tab{padding:6px 14px;border-radius:6px;font-size:.78rem;font-weight:600;cursor:pointer;color:var(--muted);transition:all .15s;border:none;background:transparent;font-family:inherit}
.tab.active{background:var(--card);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.3)}
/* LOADER */
.loader{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:.85rem;padding:20px 0}
.spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
/* WIZARD PROGRESS */
.wiz-progress{display:flex;align-items:center;justify-content:center;margin-bottom:28px;flex-wrap:wrap;gap:0}
.wp-step{display:flex;align-items:center;gap:7px}
.wp-circle{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.74rem;font-weight:700;border:2px solid var(--border);color:var(--muted);background:var(--bg2);transition:all .3s;flex-shrink:0}
.wp-circle.active{border-color:var(--accent);background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 0 14px rgba(79,110,247,.4)}
.wp-circle.done{border-color:var(--success);background:var(--success);color:#fff}
.wp-lbl{font-size:.72rem;color:var(--muted);font-weight:500;white-space:nowrap}
.wp-lbl.active{color:var(--text);font-weight:600}
.wp-conn{flex:1;height:1px;background:var(--border);min-width:20px;max-width:48px;margin:0 6px}
.wp-conn.done{background:var(--success)}
/* GENERATION PRELOADER */
.prog-wrap{max-width:480px;margin:40px auto;padding:20px 0}
.prog-title{font-size:1.05rem;font-weight:700;text-align:center;margin-bottom:5px}
.prog-sub{text-align:center;color:var(--muted);font-size:.82rem;margin-bottom:26px}
.prog-list{list-style:none;display:flex;flex-direction:column;gap:10px}
.pl-item{display:flex;align-items:center;gap:12px;padding:11px 15px;background:var(--card);border:1px solid var(--border);border-radius:9px;font-size:.85rem;color:var(--muted);transition:all .3s}
.pl-item.done{border-color:rgba(16,185,129,.3);color:var(--text)}
.pl-item.running{border-color:rgba(79,110,247,.3);color:var(--text);background:rgba(79,110,247,.04)}
.pl-icon{font-size:15px;flex-shrink:0;width:18px;text-align:center}

/* ── REPORT SPECIFIC ── */
.rpt-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 18px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:border-color .15s}
.rpt-card:hover{border-color:var(--accent)}
.rpt-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.rpt-icon.comparison{background:rgba(79,110,247,.15);color:#a0b0ff}
.rpt-icon.single{background:rgba(124,58,237,.15);color:#c4b5fd}
.rpt-icon.period{background:rgba(245,158,11,.15);color:#fbbf24}
.rpt-info{flex:1;min-width:0}
.rpt-title{font-weight:600;font-size:.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rpt-meta{font-size:.72rem;color:var(--muted);margin-top:2px}
.rpt-tags{display:flex;gap:4px;flex-shrink:0}
.rpt-tag{font-size:.65rem;padding:2px 8px;border-radius:100px;font-weight:600}
.rpt-tag.bonus{background:rgba(6,182,212,.15);color:#22d3ee}
.rpt-tag.tournament{background:rgba(59,130,246,.15);color:#60a5fa}
.rpt-tag.loyalty{background:rgba(245,158,11,.15);color:#fbbf24}
.rpt-actions{display:flex;gap:4px;flex-shrink:0}
.rpt-act-btn{width:28px;height:28px;border-radius:8px;border:1px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:13px;transition:all .15s}
.rpt-act-btn:hover{border-color:var(--accent);color:var(--accent)}
/* WIZARD — TYPE PICKER */
.type-pick{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.type-opt{border:1px solid var(--border);border-radius:10px;padding:16px;cursor:pointer;text-align:center;transition:all .15s}
.type-opt:hover{border-color:var(--accent)}
.type-opt.selected{border-color:var(--accent);border-width:2px;background:rgba(79,110,247,.06)}
.type-opt-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;margin:0 auto 8px;font-size:18px}
.type-opt-name{font-weight:600;font-size:.85rem;margin-bottom:3px}
.type-opt-desc{font-size:.72rem;color:var(--muted)}
/* ACTIVITY PICKER */
.act-tabs{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap}
.act-tab{padding:4px 12px;font-size:.74rem;border-radius:100px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:inherit;font-weight:600;transition:all .15s}
.act-tab:hover{border-color:var(--accent);color:var(--accent)}
.act-tab.on{background:rgba(79,110,247,.2);border-color:rgba(79,110,247,.5);color:#a0b0ff}
.act-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;border:1px solid var(--border);cursor:pointer;transition:all .15s;margin-bottom:6px}
.act-item:hover{border-color:var(--accent)}
.act-item.selected{border-color:var(--accent);background:rgba(79,110,247,.06)}
.act-item input[type=checkbox]{accent-color:var(--accent)}
.act-info{flex:1;min-width:0}
.act-name{font-size:.82rem;font-weight:600}
.act-detail{font-size:.7rem;color:var(--muted);margin-top:1px}
.act-type-tag{font-size:.65rem;padding:2px 8px;border-radius:100px;font-weight:600}
/* REPORT PREVIEW */
.rpt-header{margin-bottom:20px}
.rpt-header-type{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-weight:600}
.rpt-header-title{font-size:1.2rem;font-weight:700;margin-top:4px}
.rpt-header-date{font-size:.75rem;color:var(--muted);margin-top:4px}
.rpt-section{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px 24px;margin-bottom:16px}
.rpt-section-title{font-weight:600;font-size:.88rem;margin-bottom:14px;color:#a0b0ff}
.ai-summary{background:rgba(124,58,237,.08);border:1px solid rgba(124,58,237,.2);border-radius:10px;padding:14px 18px}
.ai-summary-label{font-size:.72rem;font-weight:600;color:#c4b5fd;margin-bottom:6px}
.ai-summary-text{font-size:.82rem;line-height:1.6;color:var(--text)}
.metric-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.metric-card{background:var(--bg3);border-radius:8px;padding:12px 14px}
.metric-label{font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;font-weight:600}
.metric-values{display:flex;align-items:baseline;gap:8px;margin-top:6px}
.metric-val{font-size:1.1rem;font-weight:700}
.metric-val.best{color:var(--success)}
.metric-val.worst{color:#ef4444}
.metric-val.neutral{color:var(--text)}
.cmp-table{width:100%;border-collapse:collapse;font-size:.82rem}
.cmp-table th,.cmp-table td{padding:8px 0;border-bottom:1px solid var(--border)}
.cmp-table th{color:var(--muted);font-weight:600;font-size:.72rem;text-transform:uppercase;letter-spacing:.04em}
.cmp-table td.center{text-align:center}
.struct-grid{display:grid;gap:16px}
.struct-card{border:1px solid var(--border);border-radius:8px;padding:14px}
.struct-card-title{font-size:.75rem;font-weight:600;margin-bottom:8px}
.struct-card-body{font-size:.8rem;line-height:1.7;color:var(--text)}
.struct-card-note{font-size:.7rem;color:var(--muted);margin-top:6px}
/* PERIOD REPORT */
.forecast-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.fc-card{background:var(--bg3);border-radius:8px;padding:12px 14px;text-align:center}
.fc-label{font-size:.65rem;color:var(--muted);text-transform:uppercase;font-weight:600;letter-spacing:.04em}
.fc-val{font-size:1.15rem;font-weight:700;margin-top:4px}
.fc-val.green{color:var(--success)}
.fc-val.red{color:#ef4444}
.fc-val.amber{color:var(--warn)}
.pair-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:.8rem}
.pair-row:last-child{border-bottom:none}
.pair-loss{color:#ef4444;font-weight:600;font-size:.75rem;flex-shrink:0;width:60px;text-align:right}
/* EMPTY STATE */
.empty-state{text-align:center;padding:60px 20px}
.empty-icon{font-size:2.5rem;margin-bottom:12px;opacity:.4}
.empty-title{font-size:1rem;font-weight:600;margin-bottom:6px}
.empty-desc{font-size:.82rem;color:var(--muted);margin-bottom:18px}
/* PRINT */
@media print{
  .sidebar,.topbar,.rpt-actions,.btn{display:none!important}
  .main{margin-left:0!important}
  body{background:#fff;color:#111}
  .card,.rpt-section{border-color:#ddd;background:#fff}
  .econ-card,.metric-card,.fc-card{background:#f5f5f5}
}
/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 20px;font-size:.82rem;box-shadow:0 4px 24px rgba(0,0,0,.4);z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1;pointer-events:auto}
@media(max-width:600px){.econ-grid,.metric-grid{grid-template-columns:1fr 1fr}.content{padding:16px 14px}.type-pick{grid-template-columns:1fr}.forecast-cards{grid-template-columns:1fr 1fr}}
</style>
</head>

<script type="module" src="/forecast.js"></script>
<script src="/reports.js"></script>
<script>
document.addEventListener('click', function(e) {
  const a = e.target.closest('a[href]');
  if (!a || !a.closest('.sidebar')) return;
  const href = a.getAttribute('href');
  if (!href || href.startsWith('#') || a.target) return;
  let url;
  try { url = new URL(href, location.href); } catch(e) { return; }
  if (url.origin !== location.origin) return;
  if (url.pathname === location.pathname) return;
  e.preventDefault();
  const m = document.querySelector('.main');
  if (m) { m.style.transition = 'opacity .1s ease'; m.style.opacity = '0'; }
  setTimeout(() => { location.href = href; }, 110);
});
</script>
</body>
</html>
